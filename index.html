<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Color Palette Generator - DevKit</title><meta name="description" content="在线调色板生成器 - 单色生成10色调色板"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}.logo{font-size:18px;font-weight:700;color:#58a6ff}.logo span{color:#f0c040}main{max-width:700px;margin:32px auto;padding:0 24px;flex:1}footer{padding:16px 24px;border-top:1px solid #21262d;text-align:center;font-size:12px;color:#484f58}footer a{color:#58a6ff;text-decoration:none;margin:0 8px}.ta{width:100%;padding:16px;font-size:13px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#c9d1d9;resize:vertical;outline:none;font-family:mono;line-height:1.6}.ta:focus{border-color:#58a6ff}.btn{padding:10px 24px;font-size:13px;font-weight:600;border:1px solid #30363d;border-radius:8px;cursor:pointer;background:#21262d;color:#c9d1d9}.btn:hover{background:#30363d}.btn-p{background:#238636;border-color:#238636;color:#fff}.btn-p:hover{background:#2ea043}.actions{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;align-items:center}.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin:12px 0}</style></head><body><header><div class="logo">🛠 <span>Dev</span>Kit</div><div style="font-size:11px;color:#8b949e">🔒 本地处理 · 数据不上传</div></header><main><h1 style="font-size:24px;margin-bottom:4px">Color Palette Generator</h1><p style="color:#8b949e;font-size:14px;margin-bottom:16px">在线调色板生成器 - 单色生成10色调色板</p><div class="tool-wrapper"><div class="card" style="text-align:center"><input type="color" id="cp-pick" value="#58a6ff" style="width:80px;height:80px;border-radius:12px;border:2px solid #30363d;cursor:pointer"><div style="margin-top:8px;font-family:mono;font-size:16px;color:#c9d1d9" id="cp-hex">#58A6FF</div></div><div id="cp-palette" style="display:flex;border-radius:8px;overflow:hidden;height:80px;margin:16px 0"></div><div class="actions"><button class="btn btn-p" onclick="randomColor()">🎲 随机</button><button class="btn" onclick="navigator.clipboard.writeText(Array.from(document.querySelectorAll('#cp-palette div')).map(d=>d.dataset.color).join('\n'))">📋 复制全部</button></div><script>function gen(){const h=document.getElementById('cp-pick').value;const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);const colors=[];for(let i=-4;i<=5;i++){const f=0.9+i*0.18;colors.push('#'+[r,g,b].map(c=>Math.max(0,Math.min(255,Math.round(c*f))).toString(16).padStart(2,'0')).join(''))}document.getElementById('cp-palette').innerHTML=colors.map(c=>'<div style="flex:1;background:'+c+';cursor:pointer" data-color="'+c+'" title="'+c+'" onclick="navigator.clipboard.writeText(this.dataset?.color||\'\')"></div>').join('')}function randomColor(){const c='#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');document.getElementById('cp-pick').value=c;document.getElementById('cp-hex').textContent=c.toUpperCase();gen()}document.getElementById('cp-pick').addEventListener('input',function(){document.getElementById('cp-hex').textContent=this.value.toUpperCase();gen()});gen()</script></div></main><footer><a href="https://github.com/479464887-rgb/color-palette">GitHub</a><span>·</span><span>© 2026 DevKit</span></footer><script></script></body></html>
